# Albert IA Agentic - Production
version: '3.8'

services:
  albert:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: albert-agentic
    restart: unless-stopped
    ports:
      - "8090:8090"
    environment:
      - ALBERT_API_KEY=${ALBERT_API_KEY}
      - BOT_ACCESS_TOKEN=${BOT_ACCESS_TOKEN:-change-me-in-production}
      - HOST=0.0.0.0
      - PORT=8090
      - DEBUG=false
      - PYTHON_EXEC_TIMEOUT=30
      - PYTHON_MEMORY_LIMIT=256
      - RATE_LIMIT_REQUESTS=30
      - MAX_CHAT_HISTORY=100
    volumes:
      - ./workspace:/app/workspace
      - ./tools:/app/tools
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

networks:
  default:
    name: albert-network
